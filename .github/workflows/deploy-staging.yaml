name: Deploy to Staging

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or commit to deploy"
        required: true
        default: "main"
        type: string

permissions:
  contents: read

jobs:
  deploy:
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # v1.3.1

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive

      - name: Verify tag is on main
        run: |
          git fetch --tags origin main
          if ! git rev-parse -q --verify "refs/tags/${{ inputs.tag }}" >/dev/null; then
            echo "ERROR: '${{ inputs.tag }}' is not an existing tag" >&2
            exit 1
          fi
          tag_commit="$(git rev-list -n 1 "refs/tags/${{ inputs.tag }}")"
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "ERROR: tag ${{ inputs.tag }} is not on main" >&2
            exit 1
          fi

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25  # v22
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d  # v14
        continue-on-error: true

      - name: Connect to Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8  # v4.1.2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Resolve deploy host via Tailscale
        run: |
          DEPLOY_HOST=$(nix eval --raw --file keys.nix tailscaleHost.staging)
          echo "DEPLOY_HOST=$DEPLOY_HOST" >> "$GITHUB_ENV"
          echo "::add-mask::$DEPLOY_HOST"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -R "$DEPLOY_HOST" >/dev/null 2>&1 || true
          echo "$DEPLOY_HOST $(nix eval --raw --file keys.nix keys.host-staging)" >> ~/.ssh/known_hosts

      - name: Warm up Tailscale tunnel
        run: |
          for attempt in {1..6}; do
            if tailscale ping --c 1 "$DEPLOY_HOST"; then
              exit 0
            fi
            echo "Tailscale ping failed on attempt $attempt; retrying..."
            sleep 5
          done
          tailscale status
          exit 1

      - name: Deploy all profiles
        run: nix run .#stagingDeployAll

      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh/id_ed25519
